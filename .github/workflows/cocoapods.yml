name: CocoaPods Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pod-lint:
    name: pod lib lint
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Lint podspec
        run: pod lib lint Anchorage.podspec --allow-warnings
