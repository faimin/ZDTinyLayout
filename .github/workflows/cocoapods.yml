name: CocoaPods Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pod-lint:
    name: pod spec lint (${{ matrix.platform }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, tvos, osx, visionos]

    steps:
      - uses: actions/checkout@v6

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
      - name: Get swift version
        run: swift --version

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Lint podspec (${{ matrix.platform }})
        run: pod spec lint ZDTinyLayout.podspec --allow-warnings --platforms=${{ matrix.platform }}
